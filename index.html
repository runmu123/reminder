<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#fff9e6">
    <title>日程提醒</title>
    <style>
        html.app-preload body {
            visibility: hidden;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>
    <script>
        (function () {
            var root = document.documentElement;
            root.classList.add('app-preload');

            var revealed = false;
            var revealApp = function () {
                if (revealed) {
                    return;
                }
                revealed = true;
                root.classList.remove('app-preload');
            };

            var reloadToken = new URLSearchParams(window.location.search).get('__reload');
            var href = 'css/styles.css';
            if (reloadToken) {
                href += '?__reload=' + encodeURIComponent(reloadToken);
            }
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            link.onload = revealApp;
            link.onerror = revealApp;
            document.head.appendChild(link);
            setTimeout(revealApp, 3000);
        })();
    </script>
</head>

<body>
    <div class="container">
        <div class="main-page" id="mainPage">
            <button class="search-btn" id="searchBtn" type="button" aria-label="搜索">🔍</button>
            <button class="add-btn" type="button">+</button>
            <div class="time-section">
                <div class="date" id="date"></div>
                <div class="clock">
                    <div class="clock-item" id="hours"></div>
                    <div class="clock-separator">:</div>
                    <div class="clock-item" id="minutes"></div>
                    <div class="clock-separator">:</div>
                    <div class="clock-item" id="seconds"></div>
                </div>
            </div>

            <div class="countdown-list" id="countdownList"></div>
        </div>

        <div class="add-event-page" id="addEventPage">
            <div class="back-btn" id="backBtn">←</div>

            <div class="form-section">
                <div class="form-label">
                    <i>📄</i>
                    <span>输入事件名称</span>
                </div>
                <input type="text" class="form-input" id="eventName" placeholder="请输入事件名称">
            </div>

            <div class="form-section">
                <div class="form-label">
                    <i>📅</i>
                    <span>目标日 (未来日期为倒数，过去日期为正数)</span>
                </div>
                <div class="date-display" id="targetDateDisplay"></div>
                <div class="calendar-toggle">
                    <div class="toggle-btn active" data-type="solar">公历</div>
                    <div class="toggle-btn" data-type="lunar">农历</div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-label">
                        <i>🔄</i>
                        <span>重复类型</span>
                    </div>
                    <div class="repeat-select-wrap">
                        <button class="select-btn repeat-select-btn" id="repeatType" type="button" aria-expanded="false">不重复 ▾</button>
                        <div class="repeat-dropdown" id="repeatDropdown">
                            <button class="repeat-option active" type="button" data-value="不重复">不重复</button>
                            <button class="repeat-option" type="button" data-value="每周">每周</button>
                            <button class="repeat-option" type="button" data-value="每月">每月</button>
                            <button class="repeat-option" type="button" data-value="每年">每年</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="switch-container">
                    <div class="form-label">
                        <i>➕</i>
                        <span>正数包含起始日 (+1 天)</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="includeStartDay">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            

            <button class="save-btn" id="saveBtn">保存</button>
        </div>

        <div class="my-page" id="myPage">
            <button class="settings-card-btn login-card-btn" id="loginBtn" type="button">
                <span class="settings-card-icon" aria-hidden="true">
                    <svg class="login-card-icon-svg" viewBox="0 0 24 24" focusable="false">
                        <circle cx="12" cy="7.2" r="3.2"></circle>
                        <path d="M6.8 18.8c0-2.7 2.3-4.8 5.2-4.8s5.2 2.1 5.2 4.8"></path>
                    </svg>
                </span>
                <span class="settings-card-title">登录</span>
                <span class="settings-card-desc">点击进行切换账号或者注销</span>
            </button>
        </div>

        <div class="todo-page" id="todoPage">
            <div class="todo-header">待办</div>
            <div class="todo-quick-add">
                <input class="todo-input" id="todoQuickInput" type="text" placeholder="输入待办后回车或点击添加">
                <button class="todo-add-btn" id="todoQuickAddBtn" type="button">添加</button>
            </div>
            <div class="todo-filter-bar" id="todoFilterBar">
                <button class="todo-filter-btn active" data-filter="all" type="button">全部</button>
                <button class="todo-filter-btn" data-filter="active" type="button">未完成</button>
                <button class="todo-filter-btn" data-filter="completed" type="button">已完成</button>
                <button class="todo-filter-btn" data-filter="today" type="button">今天</button>
            </div>
            <div class="todo-stats" id="todoStats"></div>
            <div class="todo-list" id="todoList"></div>
        </div>

        <div class="detail-page" id="detailPage">
            <div class="detail-back" id="detailBackBtn">←</div>
            <div class="detail-swiper" id="detailSwiper"></div>
            <div class="detail-actions">
                <button class="detail-action-btn edit" id="detailEditBtn">编辑</button>
                <button class="detail-action-btn delete" id="detailDeleteBtn">删除</button>
            </div>
        </div>

        <div class="date-picker-modal" id="datePickerModal">
            <div class="date-picker-content">
                <div class="date-picker-title">选择器</div>
                <div class="date-picker-body">
                    <div class="date-column">
                        <div class="column-label" id="yearLabel">年</div>
                        <div class="date-wheel" id="yearWheel">
                            <div class="date-wheel-inner" id="yearWheelInner"></div>
                        </div>
                    </div>
                    <div class="date-column">
                        <div class="column-label" id="monthLabel">月</div>
                        <div class="date-wheel" id="monthWheel">
                            <div class="date-wheel-inner" id="monthWheelInner"></div>
                        </div>
                    </div>
                    <div class="date-column">
                        <div class="column-label" id="dayLabel">日</div>
                        <div class="date-wheel" id="dayWheel">
                            <div class="date-wheel-inner" id="dayWheelInner"></div>
                        </div>
                    </div>
                </div>
                <div class="date-picker-buttons">
                    <button class="picker-btn cancel" id="datePickerCancel">取消</button>
                    <button class="picker-btn confirm" id="datePickerConfirm">确认</button>
                </div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" id="navSchedule" data-page="schedule">
                <i>📅</i>
                <span>日程</span>
            </div>
            <div class="nav-item" id="navTodo" data-page="todo">
                <i>📝</i>
                <span>待办</span>
            </div>
            <div class="nav-item" id="navApps" data-page="apps">
                <i>⟳</i>
                <span>刷新</span>
            </div>
            <div class="nav-item" id="navMe" data-page="me">
                <i>👤</i>
                <span>我的</span>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    <div class="refresh-overlay" id="refreshOverlay">
        <div class="refresh-card">
            <div class="refresh-title">正在强制刷新资源</div>
            <div class="refresh-subtitle" id="refreshProgressText">准备中...</div>
            <div class="refresh-track">
                <div class="refresh-bar" id="refreshProgressBar"></div>
            </div>
        </div>
    </div>
    <div class="login-modal" id="loginModal">
        <div class="login-modal-card">
            <div class="login-modal-title">登录</div>
            <div class="login-modal-subtitle">未注册用户将自动创建账号</div>
            <input class="login-input" id="loginUserName" type="text" placeholder="请输入用户名">
            <input class="login-input" id="loginUserPassport" type="password" placeholder="请输入密码">
            <div class="login-modal-actions">
                <button class="login-modal-btn cancel" id="loginCancelBtn" type="button">取消</button>
                <button class="login-modal-btn confirm" id="loginConfirmBtn" type="button">登录</button>
            </div>
        </div>
    </div>
    <div class="account-action-modal" id="accountActionModal">
        <div class="account-action-card">
            <div class="account-action-title" id="accountActionTitle">当前登录用户为:</div>
            <button class="account-action-btn primary" id="switchAccountBtn" type="button">切换账号</button>
            <button class="account-action-btn danger" id="logoutBtn" type="button">注销</button>
            <button class="account-action-btn" id="accountActionCancelBtn" type="button">取消</button>
        </div>
    </div>
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-card">
            <div class="confirm-title">确认操作</div>
            <div class="confirm-message" id="confirmMessage">确认继续吗？</div>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" id="confirmCancelBtn" type="button">取消</button>
                <button class="confirm-btn danger" id="confirmOkBtn" type="button">确认删除</button>
            </div>
        </div>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-card">
            <div class="search-title">搜索事件</div>
            <input class="search-input" id="searchInput" type="text" placeholder="按事件名称搜索">
            <div class="search-actions">
                <button class="search-btn-action clear" id="searchClearBtn" type="button">清空</button>
                <button class="search-btn-action cancel" id="searchCancelBtn" type="button">取消</button>
                <button class="search-btn-action confirm" id="searchConfirmBtn" type="button">搜索</button>
            </div>
        </div>
    </div>

    <div class="todo-modal" id="todoModal">
        <div class="todo-modal-card">
            <div class="todo-modal-title" id="todoModalTitle">新增待办</div>
            <input class="todo-modal-input" id="todoModalTaskTitle" type="text" placeholder="请输入待办标题">
            <textarea class="todo-modal-textarea" id="todoModalTaskNote" placeholder="备注（可选）"></textarea>
            <div class="todo-modal-row">
                <label class="todo-modal-label" for="todoModalTaskDueDate">截止日期</label>
                <input class="todo-modal-date" id="todoModalTaskDueDate" type="date">
            </div>
            <div class="todo-modal-row">
                <label class="todo-modal-label" for="todoModalTaskPriority">优先级</label>
                <select class="todo-modal-select" id="todoModalTaskPriority">
                    <option value="low">低</option>
                    <option value="medium" selected>中</option>
                    <option value="high">高</option>
                </select>
            </div>
            <div class="todo-modal-actions">
                <button class="todo-modal-btn delete" id="todoModalDeleteBtn" type="button">删除</button>
                <button class="todo-modal-btn cancel" id="todoModalCancelBtn" type="button">取消</button>
                <button class="todo-modal-btn confirm" id="todoModalSaveBtn" type="button">保存</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
